<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>みんなの声</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700&family=Noto+Serif+JP:wght@300;400&display=swap');

  :root {
    --bg: #0f0e17;
    --surface: #1a1828;
    --accent: #ff6b6b;
    --accent2: #ffd166;
    --text: #fffffe;
    --muted: #a7a9be;
    --card: #232136;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Zen Maru Gothic', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* 背景装飾 */
  body::before {
    content: '';
    position: fixed;
    width: 600px; height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,107,107,0.08) 0%, transparent 70%);
    top: -100px; left: -100px;
    pointer-events: none;
  }
  body::after {
    content: '';
    position: fixed;
    width: 500px; height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,209,102,0.06) 0%, transparent 70%);
    bottom: -100px; right: -100px;
    pointer-events: none;
  }

  .container {
    width: min(680px, 92vw);
    text-align: center;
    position: relative;
    z-index: 1;
  }

  .header {
    margin-bottom: 48px;
  }

  .header-label {
    font-family: 'Noto Serif JP', serif;
    font-size: 11px;
    letter-spacing: 0.3em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 12px;
    opacity: 0.9;
  }

  .header h1 {
    font-size: clamp(1.6rem, 5vw, 2.4rem);
    font-weight: 700;
    letter-spacing: 0.05em;
    color: var(--text);
  }

  /* スライドエリア */
  .slide-wrapper {
    position: relative;
    height: 260px;
    perspective: 1000px;
  }

  .slide {
    position: absolute;
    width: 100%;
    top: 0; left: 0;
    opacity: 0;
    transform: translateY(30px) scale(0.97);
    transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    pointer-events: none;
  }

  .slide.active {
    opacity: 1;
    transform: translateY(0) scale(1);
    pointer-events: all;
  }

  .slide.exiting {
    opacity: 0;
    transform: translateY(-30px) scale(0.97);
    transition: all 0.4s cubic-bezier(0.4, 0, 1, 1);
  }

  .card {
    background: var(--card);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 20px;
    padding: 44px 40px;
    position: relative;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  }

  .card::before {
    content: '❝';
    font-family: Georgia, serif;
    font-size: 80px;
    color: var(--accent);
    opacity: 0.15;
    position: absolute;
    top: 8px; left: 20px;
    line-height: 1;
  }

  .comment-text {
    font-family: 'Noto Serif JP', serif;
    font-size: clamp(1.05rem, 3vw, 1.3rem);
    line-height: 1.9;
    color: var(--text);
    font-weight: 300;
    letter-spacing: 0.02em;
    min-height: 100px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* インジケーター */
  .indicators {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-top: 28px;
  }

  .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--muted);
    opacity: 0.3;
    transition: all 0.3s;
    cursor: pointer;
  }

  .dot.active {
    background: var(--accent);
    opacity: 1;
    width: 24px;
    border-radius: 3px;
  }

  /* コントロール */
  .controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    margin-top: 24px;
  }

  .btn {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.15);
    color: var(--muted);
    padding: 8px 18px;
    border-radius: 100px;
    cursor: pointer;
    font-family: 'Zen Maru Gothic', sans-serif;
    font-size: 13px;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .btn-pause {
    font-size: 15px;
    width: 40px; height: 40px;
    padding: 0;
    justify-content: center;
    border-radius: 50%;
  }

  .counter {
    font-size: 12px;
    color: var(--muted);
    opacity: 0.6;
    min-width: 60px;
    text-align: center;
    letter-spacing: 0.05em;
  }

  /* CSVロード */
  .csv-section {
    margin-top: 44px;
    padding-top: 28px;
    border-top: 1px solid rgba(255,255,255,0.06);
  }

  .csv-label {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.15em;
    margin-bottom: 12px;
    opacity: 0.6;
  }

  .file-input-wrapper {
    display: inline-block;
    position: relative;
  }

  input[type="file"] {
    display: none;
  }

  .file-btn {
    background: rgba(255,255,255,0.04);
    border: 1px dashed rgba(255,255,255,0.2);
    color: var(--muted);
    padding: 10px 24px;
    border-radius: 10px;
    cursor: pointer;
    font-family: 'Zen Maru Gothic', sans-serif;
    font-size: 13px;
    transition: all 0.2s;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }

  .file-btn:hover {
    border-color: var(--accent2);
    color: var(--accent2);
    background: rgba(255,209,102,0.05);
  }

  .file-status {
    font-size: 12px;
    color: var(--accent2);
    margin-top: 8px;
    height: 18px;
    transition: opacity 0.3s;
  }

  /* CSVカラム設定 */
  .column-config {
    margin-top: 12px;
    display: none;
    gap: 10px;
    align-items: center;
    justify-content: center;
    flex-wrap: wrap;
  }

  .column-config.visible { display: flex; }

  .column-config label {
    font-size: 12px;
    color: var(--muted);
  }

  .column-config select {
    background: var(--surface);
    border: 1px solid rgba(255,255,255,0.15);
    color: var(--text);
    padding: 4px 10px;
    border-radius: 6px;
    font-family: 'Zen Maru Gothic', sans-serif;
    font-size: 12px;
    cursor: pointer;
  }

  .apply-btn {
    background: var(--accent);
    border: none;
    color: white;
    padding: 5px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-family: 'Zen Maru Gothic', sans-serif;
    font-size: 12px;
    transition: opacity 0.2s;
  }
  .apply-btn:hover { opacity: 0.85; }

  /* レスポンシブ */
  @media (max-width: 480px) {
    .card { padding: 36px 24px; }
  }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="header-label">Voice of Everyone</div>
    <h1>みんなの声</h1>
  </div>

  <div class="slide-wrapper" id="slideWrapper">
    <!-- スライドがJSで生成されます -->
  </div>

  <div class="indicators" id="indicators"></div>

  <div class="controls">
    <button class="btn" onclick="prevSlide()">← 前へ</button>
    <button class="btn btn-pause" id="pauseBtn" onclick="togglePause()" title="一時停止 / 再生">⏸</button>
    <button class="btn" onclick="nextSlide()">次へ →</button>
  </div>
  <div class="counter" id="counter"></div>

  <div class="csv-section">
    <div class="csv-label">▸ CSVファイルを読み込む</div>
    <div class="file-input-wrapper">
      <label class="file-btn" for="csvInput">
        📂 CSVを選択
      </label>
      <input type="file" id="csvInput" accept=".csv" onchange="loadCSV(this)">
    </div>
    <div class="file-status" id="fileStatus"></div>

    <div class="column-config" id="columnConfig">
      <label>コメント列：</label>
      <select id="columnSelect"></select>
      <button class="apply-btn" onclick="applyColumn()">適用</button>
    </div>
  </div>
</div>

<script>
// ========== サンプルデータ ==========
let comments = [
  "このイベント、来て本当によかった！また絶対来ます",
  "スタッフの方がとても親切で感動しました",
  "初めて参加しましたが、すごく楽しかったです",
  "友達と一緒に来ました。最高の思い出になりました",
  "来年も開催してほしい！楽しみにしています",
  "内容がとても充実していて、あっという間でした",
  "また参加したいです。ありがとうございました",
];

// ========== スライドショー管理 ==========
let currentIndex = 0;
let isPaused = false;
let timer = null;
const INTERVAL = 4000;

function shuffle(arr) {
  // Fisher-Yates シャッフル
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

let shuffledComments = shuffle(comments);

function buildSlides() {
  shuffledComments = shuffle(comments);
  const wrapper = document.getElementById('slideWrapper');
  const indicators = document.getElementById('indicators');
  wrapper.innerHTML = '';
  indicators.innerHTML = '';

  shuffledComments.forEach((text, i) => {
    const slide = document.createElement('div');
    slide.className = 'slide' + (i === 0 ? ' active' : '');
    slide.dataset.index = i;
    slide.innerHTML = `
      <div class="card">
        <div class="comment-text">${escapeHtml(text)}</div>
      </div>
    `;
    wrapper.appendChild(slide);

    const dot = document.createElement('div');
    dot.className = 'dot' + (i === 0 ? ' active' : '');
    dot.onclick = () => goTo(i);
    indicators.appendChild(dot);
  });

  currentIndex = 0;
  updateCounter();
  startTimer();
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function goTo(index) {
  const slides = document.querySelectorAll('.slide');
  const dots = document.querySelectorAll('.dot');
  if (!slides.length) return;

  slides[currentIndex].classList.remove('active');
  slides[currentIndex].classList.add('exiting');
  setTimeout(() => slides[currentIndex]?.classList.remove('exiting'), 400);

  dots[currentIndex].classList.remove('active');

  currentIndex = (index + shuffledComments.length) % shuffledComments.length;

  slides[currentIndex].classList.add('active');
  dots[currentIndex].classList.add('active');
  updateCounter();
  resetTimer();
}

function nextSlide() { goTo(currentIndex + 1); }
function prevSlide() { goTo(currentIndex - 1); }

function updateCounter() {
  document.getElementById('counter').textContent =
    `${currentIndex + 1} / ${shuffledComments.length}`;
}

function startTimer() {
  clearInterval(timer);
  if (!isPaused) {
    timer = setInterval(() => goTo(currentIndex + 1), INTERVAL);
  }
}

function resetTimer() {
  if (!isPaused) startTimer();
}

function togglePause() {
  isPaused = !isPaused;
  document.getElementById('pauseBtn').textContent = isPaused ? '▶' : '⏸';
  if (isPaused) {
    clearInterval(timer);
  } else {
    startTimer();
  }
}

// ========== CSV読み込み ==========
let csvHeaders = [];
let csvRows = [];

function loadCSV(input) {
  const file = input.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = (e) => {
    const text = e.target.result;
    parseCSV(text);
    document.getElementById('fileStatus').textContent =
      `✓ ${file.name} を読み込みました（${csvRows.length}件）`;
  };
  reader.readAsText(file, 'UTF-8');
}

function parseCSV(text) {
  // BOM除去
  text = text.replace(/^\uFEFF/, '');
  const lines = text.trim().split(/\r?\n/);
  if (lines.length < 2) {
    alert('CSVにデータがありません');
    return;
  }

  csvHeaders = splitCSVLine(lines[0]);
  csvRows = lines.slice(1).map(l => splitCSVLine(l));

  // カラム選択UIを表示
  const sel = document.getElementById('columnSelect');
  sel.innerHTML = csvHeaders.map((h, i) =>
    `<option value="${i}">${h || '列' + (i+1)}</option>`
  ).join('');
  document.getElementById('columnConfig').classList.add('visible');
}

function splitCSVLine(line) {
  // シンプルなCSVパーサー（ダブルクォート対応）
  const result = [];
  let cur = '';
  let inQ = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') {
      if (inQ && line[i+1] === '"') { cur += '"'; i++; }
      else inQ = !inQ;
    } else if (c === ',' && !inQ) {
      result.push(cur.trim());
      cur = '';
    } else {
      cur += c;
    }
  }
  result.push(cur.trim());
  return result;
}

function applyColumn() {
  const colIndex = parseInt(document.getElementById('columnSelect').value);
  const newComments = csvRows
    .map(row => row[colIndex] || '')
    .filter(t => t.trim() !== '');

  if (newComments.length === 0) {
    alert('選択した列にデータがありません');
    return;
  }

  comments = newComments;
  buildSlides();
  document.getElementById('fileStatus').textContent =
    `✓ ${newComments.length}件のコメントを表示中`;
}

// ========== 初期化 ==========
buildSlides();
</script>
</body>
</html>
