<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>みんなの声</title><style>
@import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700&family=Noto+Serif+JP:wght@300;400&display=swap');
:root{--bg:#0f0e17;--surface:#1a1828;--accent:#ff6b6b;--text:#fffffe;--muted:#a7a9be;--card:#232136}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Zen Maru Gothic',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;position:relative}
body::before{content:'';position:fixed;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(255,107,107,0.08) 0%,transparent 70%);top:-100px;left:-100px;pointer-events:none}
body::after{content:'';position:fixed;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(255,209,102,0.06) 0%,transparent 70%);bottom:-100px;right:-100px;pointer-events:none}
.container{width:min(680px,92vw);text-align:center;position:relative;z-index:1}
.header{margin-bottom:48px}
.header-label{font-family:'Noto Serif JP',serif;font-size:11px;letter-spacing:0.3em;color:var(--accent);margin-bottom:12px;opacity:0.9}
.header h1{font-size:clamp(1.6rem,5vw,2.4rem);font-weight:700;letter-spacing:0.05em}
.slide-wrapper{position:relative;height:260px}
.slide{position:absolute;width:100%;top:0;left:0;opacity:0;transform:translateY(30px) scale(0.97);transition:all 0.6s cubic-bezier(0.4,0,0.2,1);pointer-events:none}
.slide.active{opacity:1;transform:translateY(0) scale(1);pointer-events:all}
.slide.exiting{opacity:0;transform:translateY(-30px) scale(0.97);transition:all 0.4s cubic-bezier(0.4,0,1,1)}
.card{background:var(--card);border:1px solid rgba(255,255,255,0.07);border-radius:20px;padding:44px 40px;position:relative;box-shadow:0 20px 60px rgba(0,0,0,0.4)}
.card::before{content:'\275D';font-family:Georgia,serif;font-size:80px;color:var(--accent);opacity:0.15;position:absolute;top:8px;left:20px;line-height:1}
.comment-text{font-family:'Noto Serif JP',serif;font-size:clamp(1.05rem,3vw,1.3rem);line-height:1.9;color:var(--text);font-weight:300;letter-spacing:0.02em;min-height:100px;display:flex;align-items:center;justify-content:center}
.indicators{display:flex;justify-content:center;gap:8px;margin-top:28px}
.dot{width:6px;height:6px;border-radius:50%;background:var(--muted);opacity:0.3;transition:all 0.3s;cursor:pointer}
.dot.active{background:var(--accent);opacity:1;width:24px;border-radius:3px}
.controls{display:flex;align-items:center;justify-content:center;gap:20px;margin-top:24px}
.btn{background:transparent;border:1px solid rgba(255,255,255,0.15);color:var(--muted);padding:8px 18px;border-radius:100px;cursor:pointer;font-family:'Zen Maru Gothic',sans-serif;font-size:13px;transition:all 0.2s;display:flex;align-items:center;gap:6px}
.btn:hover{border-color:var(--accent);color:var(--accent)}
.btn-pause{font-size:15px;width:40px;height:40px;padding:0;justify-content:center;border-radius:50%}
.counter{font-size:12px;color:var(--muted);opacity:0.6;min-width:60px;text-align:center;letter-spacing:0.05em;margin-top:8px}
@media(max-width:480px){.card{padding:36px 24px}}
</style></head><body><div class="container"><div class="header"><div class="header-label">Voice of Everyone</div><h1>みんなの声</h1></div><div class="slide-wrapper" id="slideWrapper"></div><div class="indicators" id="indicators"></div><div class="controls"><button class="btn" onclick="prevSlide()">← 前へ</button><button class="btn btn-pause" id="pauseBtn" onclick="togglePause()">⏸</button><button class="btn" onclick="nextSlide()">次へ →</button></div><div class="counter" id="counter"></div></div><script>
const CSV_URL = './comments.csv';

async function loadCSV() {
  try {
    const res = await fetch(CSV_URL + '?t=' + Date.now());
    const text = await res.text();
    const rows = parseCSV(text);
    if (rows.length < 2) return;
    // 4列目（index 3）= リサイクルに関する質問
    const comments = rows.slice(1)
      .map(r => r[3] || '')
      .filter(t => t.trim() !== '');
    if (comments.length > 0) window._comments = comments;
  } catch(e) {
    console.log('CSV load failed, using default data');
  }
  buildSlides(window._comments);
}

function parseCSV(text) {
  text = text.replace(/^\uFEFF/, '');
  return text.trim().split(/\r?\n/).map(line => {
    const result = [];
    let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') {
        if (inQ && line[i+1] === '"') { cur += '"'; i++; }
        else inQ = !inQ;
      } else if (c === ',' && !inQ) { result.push(cur.trim()); cur = ''; }
      else cur += c;
    }
    result.push(cur.trim());
    return result;
  });
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

let shuffled = [], cur = 0, timer = null, paused = false;
const INTERVAL = 4000;

function buildSlides(comments) {
  shuffled = shuffle(comments);
  cur = 0;
  const wrapper = document.getElementById('slideWrapper');
  const indicators = document.getElementById('indicators');
  wrapper.innerHTML = '';
  indicators.innerHTML = '';
  shuffled.forEach((text, i) => {
    const slide = document.createElement('div');
    slide.className = 'slide' + (i === 0 ? ' active' : '');
    slide.innerHTML = '<div class="card"><div class="comment-text">' + escHtml(text) + '</div></div>';
    wrapper.appendChild(slide);
    const dot = document.createElement('div');
    dot.className = 'dot' + (i === 0 ? ' active' : '');
    dot.onclick = () => goTo(i);
    indicators.appendChild(dot);
  });
  updateCounter();
  startTimer();
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function goTo(index) {
  const slides = document.querySelectorAll('.slide');
  const dots = document.querySelectorAll('.dot');
  if (!slides.length) return;
  slides[cur].classList.remove('active');
  slides[cur].classList.add('exiting');
  setTimeout(() => slides[cur] && slides[cur].classList.remove('exiting'), 400);
  dots[cur].classList.remove('active');
  cur = (index + shuffled.length) % shuffled.length;
  slides[cur].classList.add('active');
  dots[cur].classList.add('active');
  updateCounter();
  if (!paused) startTimer();
}

function nextSlide() { goTo(cur + 1); }
function prevSlide() { goTo(cur - 1); }

function updateCounter() {
  document.getElementById('counter').textContent = (cur + 1) + ' / ' + shuffled.length;
}

function startTimer() {
  clearInterval(timer);
  if (!paused) timer = setInterval(() => goTo(cur + 1), INTERVAL);
}

function togglePause() {
  paused = !paused;
  document.getElementById('pauseBtn').textContent = paused ? '▶' : '⏸';
  paused ? clearInterval(timer) : startTimer();
}

window._comments = ["CSVを読み込み中です..."];
loadCSV();
<\/script></body></html>
