<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>みんなの声</title><link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;800&display=swap" rel="stylesheet"><style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#FFFFFF;font-family:'M PLUS Rounded 1c',sans-serif;overflow-x:hidden}
.lp-header{background:#FF6B8A;padding:24px 20px;text-align:center}
.lp-header h1{font-size:26px;font-weight:800;color:#fff;margin-bottom:6px}
.lp-header p{font-size:13px;color:rgba(255,255,255,0.88);margin-bottom:12px}
.lp-count{display:inline-block;background:rgba(255,255,255,0.2);border:1.5px solid rgba(255,255,255,0.5);border-radius:100px;padding:4px 18px;font-size:13px;font-weight:700;color:#fff}
.container{max-width:620px;margin:0 auto;padding:24px 20px}
.reaction-total{display:inline-flex;align-items:center;gap:10px;background:#EDF5FC;border:1.5px solid #C5DFF4;border-radius:10px;padding:8px 16px;margin-bottom:16px;font-size:13px;color:#4A90C4;flex-wrap:wrap}
.reaction-total b{color:#0C447C}
.accordion-btn{width:100%;background:#FFF0F4;border:1.5px solid #FFB3C3;border-radius:10px;padding:12px 18px;font-size:14px;font-weight:700;color:#CC3355;cursor:pointer;display:flex;align-items:center;justify-content:space-between;margin-bottom:0;transition:border-radius 0.2s}
.accordion-btn.open{border-radius:10px 10px 0 0}
.accordion-arrow{font-size:12px;transition:transform 0.2s}
.accordion-btn.open .accordion-arrow{transform:rotate(180deg)}
.accordion-content{background:#FFF8FA;border:1.5px solid #FFD6E0;border-top:none;border-radius:0 0 10px 10px;padding:14px 18px;margin-bottom:16px;display:none}
.accordion-content.open{display:block}
.accordion-guide{font-size:12px;color:#CC3355;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid #FFD6E0}
.accordion-guide-title{font-weight:700;margin-bottom:4px}
.accordion-guide-items{display:flex;gap:14px;flex-wrap:wrap}
.search-wrap{display:flex;gap:8px;align-items:center;margin-bottom:10px}
.search-input{flex:1;border:1.5px solid #FFB3C3;border-radius:8px;padding:8px 14px;font-size:14px;font-family:'M PLUS Rounded 1c',sans-serif;outline:none;color:#333;background:#FFF;transition:border 0.2s}
.search-input:focus{border-color:#FF6B8A}
.search-clear{background:none;border:none;color:#FFB3C3;font-size:20px;cursor:pointer;padding:0 4px;line-height:1}
.search-info{font-size:12px;color:#888;margin-top:6px;min-height:16px}
.sort-wrap{display:flex;align-items:center;gap:10px;margin-top:10px}
.sort-label{font-size:13px;font-weight:700;color:#CC3355}
.sort-select{border:1.5px solid #FFB3C3;border-radius:8px;padding:6px 12px;font-size:13px;color:#333;background:#FFF;cursor:pointer;font-family:'M PLUS Rounded 1c',sans-serif;outline:none}
.sort-select:focus{border-color:#FF6B8A}
.cards-wrapper{display:flex;flex-direction:column;gap:12px;margin-bottom:20px;margin-top:16px}
.tl-row{display:flex;gap:14px;align-items:stretch;opacity:0;transform:translateY(12px);transition:opacity 0.55s ease,transform 0.55s ease}
.tl-row.show{opacity:1;transform:translateY(0)}
.tl-left{display:flex;flex-direction:column;align-items:center;width:16px;flex-shrink:0}
.tl-dot{width:11px;height:11px;border-radius:50%;flex-shrink:0;margin-top:18px;border:2px solid #FFF}
.tl-line{width:2px;flex:1;margin-top:4px;border-radius:2px}
.card{flex:1;background:#FFF;border-radius:12px;padding:16px 18px;position:relative;overflow:hidden;border:1.5px solid #FFD6E0;box-shadow:3px 4px 0 #FFD6E0}
.card-bar{height:5px;position:absolute;top:0;left:0;right:0;border-radius:10px 10px 0 0}
.comment-name{font-size:13px;font-weight:700;color:#FF6B8A;margin-bottom:6px}
.comment-name-date{font-weight:400;color:#FFAABF;font-size:12px}
.comment-text{font-size:17px;line-height:1.85;color:#2A2A2A;margin-bottom:12px}
.reactions{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;align-items:center}
.reaction-btn{display:inline-flex;align-items:center;gap:5px;background:#EDF5FC;border:1.5px solid #C5DFF4;border-radius:100px;padding:6px 14px;cursor:pointer;font-size:14px;font-family:'M PLUS Rounded 1c',sans-serif;transition:all 0.15s;user-select:none;white-space:nowrap;flex-shrink:0}
.reaction-btn:hover{background:#D6EAF8;border-color:#4A90C4}
.reaction-btn.reacted{background:#C5DFF4;border-color:#4A90C4}
.reaction-count{font-size:13px;color:#0C447C;font-weight:700}
.controls{display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:8px}
.btn{background:#FFF;border:1.5px solid #FF6B8A;color:#FF6B8A;padding:10px 24px;border-radius:100px;cursor:pointer;font-family:'M PLUS Rounded 1c',sans-serif;font-size:14px;font-weight:700;transition:all 0.12s}
.btn:hover{background:#FFF0F4}
.btn:active{transform:translate(1px,1px)}
.btn-next{background:#FF6B8A;color:#FFF;border-color:#FF6B8A}
.btn-next:hover{background:#E85878;border-color:#E85878}
.counter{font-size:13px;color:#FFAABF;text-align:center;margin-top:6px}
</style></head><body>

<div class="lp-header">
  <h1>みんなの声</h1>
  <p>リサイクルに関するみんなの質問</p>
  <div class="lp-count" id="countBadge">読み込み中...</div>
</div>

<div class="container">
  <div id="reactionTotal"></div>

  <div style="background:#FFF0F4;border-left:4px solid #FF6B8A;border-radius:10px;padding:12px 16px;margin-bottom:14px">
    <div style="font-size:13px;font-weight:700;color:#CC3355;margin-bottom:6px">素敵な質問にリアクションしよう！</div>
    <div style="display:flex;gap:16px;flex-wrap:wrap;font-size:13px;color:#CC3355"><span>❤️ いいね</span><span>👀 気になる</span><span>💡 なるほど！</span></div>
  </div>

  <button class="accordion-btn" id="accordionBtn" onclick="toggleAccordion()">
    🔍 検索・絞り込み
    <span class="accordion-arrow">▼</span>
  </button>
  <div class="accordion-content" id="accordionContent">
    <div class="search-wrap">
      <input id="searchInput" class="search-input" type="text" placeholder="キーワードで検索..." oninput="doSearch()">
      <button class="search-clear" onclick="clearSearch()">✕</button>
    </div>
    <div class="sort-wrap">
      <span class="sort-label">並び替え：</span>
      <select id="sortSelect" class="sort-select" onchange="setSort(this.value)">
        <option value="random">ランダム</option>
        <option value="newest">新しい順</option>
        <option value="oldest">古い順</option>
        <option value="heart">❤️ 多い順</option>
        <option value="eyes">👀 多い順</option>
        <option value="bulb">💡 多い順</option>
        <option value="total">合計リアクション多い順</option>
      </select>
    </div>
    <div id="searchInfo" class="search-info"></div>
  </div>

  <div class="cards-wrapper" id="cardsWrapper"></div>
  <div class="controls">
    <button class="btn" onclick="prevSet()">◀ 前の3件</button>
    <button class="btn btn-next" onclick="nextSet()">次の3件 ▶</button>
  </div>
  <div class="counter" id="counter"></div>
</div>

<script>
const SUPABASE_URL='https://rhcfmhchtgmpbjsoayiw.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJoY2ZtaGNodGdtcGJqc29heWl3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0NDkwMjEsImV4cCI6MjA5NDAyNTAyMX0.oCEfclGODpa5t-afIe0zwOMr1RSZc7FVAR-WiagF1vk';
const CSV_URL='./comments.csv';
const EMOJIS=[{emoji:'❤️',label:'いいね'},{emoji:'👀',label:'気になる'},{emoji:'💡',label:'なるほど！'}];
const COLORS=[
  {bar:'#FF6B8A',dot:'#FF6B8A',line:'#FFD6E0'},
  {bar:'#FF9BB5',dot:'#FF9BB5',line:'#FFE0EB'},
  {bar:'#FFBDD0',dot:'#FFBDD0',line:'#FFEDF3'}
];
const SHOW=3;
let sets=[],setIdx=0,reactionCache={},allComments=[],currentSort='random',currentKeyword='';

function toggleAccordion(){
  const btn=document.getElementById('accordionBtn');
  const content=document.getElementById('accordionContent');
  btn.classList.toggle('open');
  content.classList.toggle('open');
}

function getUserId(){try{let id=localStorage.getItem('user_id');if(!id){id=Math.random().toString(36).slice(2)+Date.now().toString(36);localStorage.setItem('user_id',id);}return id;}catch(e){return 'anon';}}
const USER_ID=getUserId();
function lsKey(no,emoji){return 'rx_'+no+'_'+emoji;}
function isReacted(no,emoji){try{return localStorage.getItem(lsKey(no,emoji))==='1';}catch(e){return false;}}
function setReacted(no,emoji,val){try{val?localStorage.setItem(lsKey(no,emoji),'1'):localStorage.removeItem(lsKey(no,emoji));}catch(e){}}

async function fetchAllReactions(){
  try{
    const res=await fetch(SUPABASE_URL+'/rest/v1/reactions?select=question_no,emoji',{headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}});
    const data=await res.json();
    if(!Array.isArray(data))return;
    data.forEach(row=>{
      if(!reactionCache[row.question_no])reactionCache[row.question_no]={};
      reactionCache[row.question_no][row.emoji]=(reactionCache[row.question_no][row.emoji]||0)+1;
    });
  }catch(e){}
}

async function fetchReactions(nos){
  try{
    const res=await fetch(SUPABASE_URL+'/rest/v1/reaction_counts?question_no=in.('+nos.join(',')+')'+'&select=question_no,emoji,count',{headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}});
    const data=await res.json();
    if(!Array.isArray(data))return;
    data.forEach(row=>{
      if(!reactionCache[row.question_no])reactionCache[row.question_no]={};
      reactionCache[row.question_no][row.emoji]=parseInt(row.count)||0;
    });
  }catch(e){}
}

async function fetchTotalReactions(){
  try{
    const res=await fetch(SUPABASE_URL+'/rest/v1/reactions?select=emoji',{headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}});
    const data=await res.json();
    const el=document.getElementById('reactionTotal');
    if(!Array.isArray(data)||data.length===0){el.innerHTML='';return;}
    const total=data.length;
    const byEmoji={};
    data.forEach(r=>{byEmoji[r.emoji]=(byEmoji[r.emoji]||0)+1;});
    const detail=['❤️','👀','💡'].map(e=>byEmoji[e]?e+' <b>'+byEmoji[e]+'</b>':'').filter(Boolean).join('　');
    el.innerHTML='<div class="reaction-total">リアクション合計 <b>'+total+'件</b><span style="color:#C5DFF4">|</span><span>'+detail+'</span></div>';
  }catch(e){}
}

async function addReaction(no,emoji){
  try{await fetch(SUPABASE_URL+'/rest/v1/reactions',{method:'POST',headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json','Prefer':'resolution=ignore-duplicates'},body:JSON.stringify({question_no:no,emoji:emoji,user_id:USER_ID})});}catch(e){}
}
async function removeReaction(no,emoji){
  try{await fetch(SUPABASE_URL+'/rest/v1/reactions?question_no=eq.'+no+'&emoji=eq.'+encodeURIComponent(emoji)+'&user_id=eq.'+USER_ID,{method:'DELETE',headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}});}catch(e){}
}

async function handleReaction(btn){
  if(btn.dataset.processing==='1')return;
  btn.dataset.processing='1';
  const no=btn.dataset.no,emoji=btn.dataset.emoji;
  const countEl=btn.querySelector('.reaction-count');
  const current=parseInt(countEl.textContent)||0;
  if(btn.classList.contains('reacted')){
    btn.classList.remove('reacted');
    countEl.textContent=' '+Math.max(0,current-1);
    setReacted(no,emoji,false);
    if(!reactionCache[no])reactionCache[no]={};
    reactionCache[no][emoji]=Math.max(0,(reactionCache[no][emoji]||0)-1);
    await removeReaction(no,emoji);
  }else{
    btn.classList.add('reacted');
    countEl.textContent=' '+(current+1);
    setReacted(no,emoji,true);
    if(!reactionCache[no])reactionCache[no]={};
    reactionCache[no][emoji]=(reactionCache[no][emoji]||0)+1;
    await addReaction(no,emoji);
  }
  btn.dataset.processing='0';
}

function formatDate(str){
  if(!str)return '';
  const m=str.match(/\d+\/(\d+)\/(\d+)\s+(\d+):(\d+)/);
  if(m)return m[1]+'/'+m[2]+' '+m[3]+':'+m[4];
  return str;
}

function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function sortComments(comments,sort){
  if(sort==='random')return shuffle([...comments]);
  if(sort==='newest')return [...comments].sort((a,b)=>b.no-a.no);
  if(sort==='oldest')return [...comments].sort((a,b)=>a.no-b.no);
  return [...comments].sort((a,b)=>{
    const ra=reactionCache[a.no]||{},rb=reactionCache[b.no]||{};
    if(sort==='heart')return (rb['❤️']||0)-(ra['❤️']||0);
    if(sort==='eyes')return (rb['👀']||0)-(ra['👀']||0);
    if(sort==='bulb')return (rb['💡']||0)-(ra['💡']||0);
    if(sort==='total'){const ta=Object.values(ra).reduce((s,v)=>s+v,0),tb=Object.values(rb).reduce((s,v)=>s+v,0);return tb-ta;}
    return 0;
  });
}

function getFilteredComments(){
  if(!currentKeyword)return allComments;
  const kw=currentKeyword.toLowerCase();
  return allComments.filter(c=>c.text.toLowerCase().includes(kw)||c.name.toLowerCase().includes(kw));
}

function doSearch(){currentKeyword=document.getElementById('searchInput').value.trim();buildSets(currentSort);}
function clearSearch(){document.getElementById('searchInput').value='';currentKeyword='';buildSets(currentSort);}
function setSort(sort){currentSort=sort;buildSets(sort);}

function buildSets(sort){
  const filtered=getFilteredComments();
  const sorted=sortComments(filtered,sort);
  sets=[];
  for(let i=0;i<sorted.length;i+=SHOW)sets.push(sorted.slice(i,i+SHOW));
  if(sets.length===0)sets=[[]];
  setIdx=0;
  const info=document.getElementById('searchInfo');
  info.textContent=currentKeyword?'"'+currentKeyword+'" の検索結果：'+filtered.length+'件':'';
  showSet(true);
}

async function showSet(anim){
  const wrapper=document.getElementById('cardsWrapper');
  const set=sets[setIdx];
  Array.from(wrapper.children).forEach(r=>{r.style.transition='opacity 0.3s,transform 0.3s';r.style.opacity='0';r.style.transform='translateY(-10px)';});
  const nos=set.map(c=>c.no).filter(n=>n);
  const fetchPromise=nos.length?fetchReactions(nos):Promise.resolve();
  const waitPromise=new Promise(res=>setTimeout(res,anim&&wrapper.children.length>0?320:0));
  await Promise.all([fetchPromise,waitPromise]);
  wrapper.innerHTML='';
  if(!sets[setIdx]||sets[setIdx].length===0){
    wrapper.innerHTML='<div style="text-align:center;color:#FFAABF;font-size:14px;padding:40px 0;">該当する質問が見つかりませんでした</div>';
    document.getElementById('counter').textContent='';
    return;
  }
  set.forEach((item,i)=>{
    const col=COLORS[i]||COLORS[2];
    const isLast=(i===set.length-1);
    const row=document.createElement('div');
    row.className='tl-row';
    const lineHTML=isLast?'':'<div class="tl-line" style="background:'+col.line+'"></div>';
    const nameHTML=(item.name||item.date)?'<div class="comment-name">'+(item.name?esc(item.name):'')+(item.name&&item.date?' ・ ':'')+(item.date?'<span class="comment-name-date">'+esc(formatDate(item.date))+'</span>':'')+'</div>':'';
    const rxData=reactionCache[item.no]||{};
    const rxHTML=EMOJIS.map(e=>{
      const cnt=rxData[e.emoji]||0;
      const reacted=isReacted(item.no,e.emoji);
      return '<button class="reaction-btn'+(reacted?' reacted':'')+'" data-no="'+item.no+'" data-emoji="'+e.emoji+'" onclick="handleReaction(this)">'+e.emoji+'<span class="reaction-count"> '+cnt+'</span></button>';
    }).join('');
    row.innerHTML=
      '<div class="tl-left"><div class="tl-dot" style="background:'+col.dot+'"></div>'+lineHTML+'</div>'+
      '<div class="card"><div class="card-bar" style="background:'+col.bar+'"></div>'+nameHTML+'<div class="comment-text">'+highlight(item.text,currentKeyword)+'</div><div class="reactions">'+rxHTML+'</div></div>';
    wrapper.appendChild(row);
    setTimeout(()=>row.classList.add('show'),anim?i*120:0);
  });
  document.getElementById('counter').textContent=(setIdx+1)+' / '+sets.length+' セット';
}

function nextSet(){setIdx=(setIdx+1)%sets.length;showSet(true);}
function prevSet(){setIdx=(setIdx-1+sets.length)%sets.length;showSet(true);}
function highlight(text,kw){if(!kw)return esc(text);const escaped=kw.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');return esc(text).replace(new RegExp('('+escaped+')','gi'),'<mark style="background:#FEF08A;border-radius:3px;padding:0 2px">$1</mark>');}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

async function loadCSV(){
  try{
    const res=await fetch(CSV_URL+'?t='+Date.now());
    const text=await res.text();
    const rows=parseCSV(text);
    if(rows.length>=2){
      const comments=rows.slice(1).map(r=>({no:(r[0]||'').trim(),name:(r[4]||'').trim(),text:(r[5]||'').trim(),date:(r[2]||'').trim()})).filter(c=>c.text!=='');
      if(comments.length>0){init(comments);return;}
    }
  }catch(e){}
  init([{no:'0',name:'',text:'CSVを読み込めませんでした。GitHubにcomments.csvを置いてください。',date:''}]);
}

function parseCSV(text){
  text=text.replace(/^\uFEFF/,'');
  return text.trim().split(/\r?\n/).map(line=>{
    const result=[];let cur='',inQ=false;
    for(let i=0;i<line.length;i++){
      const c=line[i];
      if(c==='"'){if(inQ&&line[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}
      else if(c===','&&!inQ){result.push(cur.trim());cur='';}
      else cur+=c;
    }
    result.push(cur.trim());return result;
  });
}

async function init(comments){
  allComments=comments;
  document.getElementById('countBadge').textContent=comments.length+'件の質問が届いています';
  await Promise.all([fetchAllReactions(),fetchTotalReactions()]);
  buildSets(currentSort);
}

loadCSV();
</script>
</body></html>
